<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#060a12"/>
    </linearGradient>
    <radialGradient id="aura" cx="0.78" cy="0.2" r="0.5">
      <stop offset="0" stop-color="#2563eb" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge" x1="820" y1="180" x2="980" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5b8def"/><stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <radialGradient id="core" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#16f0ad"/><stop offset="1" stop-color="#0a8a66"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#2563eb" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#aura)"/>

  <!-- wordmark tile -->
  <g transform="translate(80, 80)">
    <rect width="64" height="64" rx="16" fill="#0a0a0a" stroke="#23262e"/>
    <path d="M19 17 L19 37 L31 37" stroke="#5b8def" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M32 37 L45 29" stroke="#5b8def" stroke-width="3.4" stroke-linecap="round" fill="none"/>
    <circle cx="19" cy="17" r="4" fill="#5b8def"/>
    <circle cx="45" cy="29" r="3.3" fill="#7ba4f2"/>
    <circle cx="32" cy="38" r="5.5" fill="#10e0a0"/>
    <path d="M29.2 38 L31.5 40.3 L35.4 36.4" stroke="#04140d" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="84" y="44" font-family="Georgia, serif" font-size="34" font-weight="600" fill="#f5f7fa">Link<tspan fill="#5b8def">3</tspan>IT</text>
  </g>

  <!-- headline -->
  <text x="80" y="300" font-family="Georgia, serif" font-size="62" font-weight="500" fill="#f5f7fa">Identity security,</text>
  <text x="80" y="372" font-family="Georgia, serif" font-size="62" font-weight="500" fill="#f5f7fa">brought under <tspan fill="#5b8def" font-style="italic">control.</tspan></text>

  <text x="82" y="430" font-family="Inter, Arial, sans-serif" font-size="24" fill="#aab2bd">Privileged access, directory hardening, and Zero Trust —</text>
  <text x="82" y="462" font-family="Inter, Arial, sans-serif" font-size="24" fill="#aab2bd">at a scale that fits your organization.</text>

  <!-- domain chips -->
  <g font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600">
    <g transform="translate(82, 520)">
      <rect width="150" height="40" rx="20" fill="#101114" stroke="#23262e"/>
      <text x="22" y="26" fill="#aab2bd">CyberArk</text>
      <circle cx="14" cy="20" r="3" fill="#10e0a0"/>
    </g>
    <g transform="translate(246, 520)">
      <rect width="160" height="40" rx="20" fill="#101114" stroke="#23262e"/>
      <text x="22" y="26" fill="#aab2bd">Entra ID</text>
      <circle cx="14" cy="20" r="3" fill="#5b8def"/>
    </g>
    <g transform="translate(420, 520)">
      <rect width="210" height="40" rx="20" fill="#101114" stroke="#23262e"/>
      <text x="22" y="26" fill="#aab2bd">Active Directory</text>
      <circle cx="14" cy="20" r="3" fill="#5b8def"/>
    </g>
    <g transform="translate(644, 520)">
      <rect width="180" height="40" rx="20" fill="#101114" stroke="#23262e"/>
      <text x="22" y="26" fill="#aab2bd">Zero Trust</text>
      <circle cx="14" cy="20" r="3" fill="#d4a017"/>
    </g>
  </g>

  <!-- large mark, right side: the 3 as a privileged access path -->
  <g transform="translate(720, 110)">
    <circle cx="190" cy="190" r="180" stroke="#23262e" stroke-width="1.5" fill="none"/>
    <circle cx="190" cy="190" r="128" stroke="#23262e" stroke-width="1.5" stroke-dasharray="4 8" fill="none"/>

    <!-- the 3, scaled 3.4x from the 100-unit mark and centered: f(x)=3.4*(x-50)+190 -> 3.4x+20 -->
    <g transform="translate(20,20) scale(3.4)">
      <path d="M34 30 C34 21 43 19 51 20 C64 21 69 31 67 40 C65 48 57 50 50 50 C57 50 65 52 67 60 C69 69 64 79 51 80 C43 81 34 79 34 70" stroke="url(#edge)" stroke-width="7.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="34" cy="29" r="4.6" fill="#7ba4f2"/>
      <circle cx="34" cy="71" r="4.6" fill="#7ba4f2"/>
      <circle cx="50" cy="50" r="15" fill="#10e0a0" opacity="0.14"/>
      <circle cx="50" cy="50" r="13.5" fill="none" stroke="url(#core)" stroke-width="1.6" opacity="0.6"/>
      <circle cx="50" cy="50" r="9.5" fill="url(#core)"/>
      <path d="M45.5 50 L49 53.5 L55 47" stroke="#04140d" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- bottom rule + url -->
  <rect x="80" y="592" width="1040" height="1" fill="#23262e"/>
  <text x="1120" y="44" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#6b7480" transform="translate(0,52)">link3it.com</text>
</svg>
